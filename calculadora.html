<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros Compostos | Carlos Engels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav style="background-color: #1a252f; padding: 15px; text-align: center;">
        <a href="index.html" style="color: white; margin: 0 10px;">Início</a>
        <a href="sobre.html" style="color: white; margin: 0 10px;">Sobre</a>
        <button onclick="alternarTema()" id="botaoTema" style="background: none; border: 1px solid white; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-left: 15px;">🌙</button>
    </nav>

    <div class="header">
        <h1>Calculadora de Juros Compostos</h1>
        <p>Simule o crescimento do seu dinheiro ao longo do tempo</p>
    </div>

    <h2>Dados do investimento</h2>
    <form>
        <p>Valor inicial (R$): <input type="number" id="valorInicial" placeholder="Ex: 1000"></p>
        <p>Aporte mensal (R$): <input type="number" id="aporteMensal" placeholder="Ex: 200"></p>
        <p>Taxa de juros mensal (%): <input type="number" id="taxaJuros" placeholder="Ex: 0.8" step="0.01"></p>
        <p>Tempo (em meses): <input type="number" id="tempoMeses" placeholder="Ex: 24"></p>
        <p><button type="button" onclick="calcular()">Calcular</button></p>
    </form>

    <div id="resultado" style="display: none; margin-top: 20px; background-color: #2c3e50; color: white; padding: 15px 25px; border-radius: 8px;">
        <p id="textoResultado"></p>
    </div>

    <a href="index.html">Voltar para o início</a>

    <footer>
        <p>© 2026 Carlos Engels - Desenvolvedor Full Stack</p>
    </footer>
<script src="index.js"></script>
    <script src="calculadora.js"></script>
</body>
</html>
